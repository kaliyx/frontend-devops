name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ECS_CLUSTER_NAME: devops-clusters
      ECS_SERVICE_MATCH: frontend

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Image
      run: docker build -t frontend-devops .

    - name: Tag Image
      run: |
        docker tag frontend-devops:latest \
        239844923591.dkr.ecr.us-east-1.amazonaws.com/frontend-devops:latest

    - name: Push Image
      run: |
        docker push \
        239844923591.dkr.ecr.us-east-1.amazonaws.com/frontend-devops:latest

    - name: Deploy ECS
      run: |
        service_arn=$(aws ecs list-services \
          --cluster "$ECS_CLUSTER_NAME" \
          --query "serviceArns[?contains(@, \`$ECS_SERVICE_MATCH\`)]|[0]" \
          --output text)

        if [ -z "$service_arn" ] || [ "$service_arn" = "None" ]; then
          echo "No ECS service containing '$ECS_SERVICE_MATCH' found in cluster $ECS_CLUSTER_NAME" >&2
          exit 1
        fi

        aws ecs update-service \
          --cluster "$ECS_CLUSTER_NAME" \
          --service "$service_arn" \
          --force-new-deployment
